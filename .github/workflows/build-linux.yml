name: Build - Linux

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    name: Build Linux (Ubuntu)
    runs-on: ubuntu-latest

    strategy:
      matrix:
        arch: [x64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Build Electron app for Linux
        run: npm run electron:build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify build artifacts
        run: |
          echo "=== Checking deb ==="
          DEB=$(ls release/*.deb 2>/dev/null)
          if [ -z "$DEB" ]; then echo "ERROR: No .deb found"; exit 1; fi
          DEB_SIZE=$(stat --format=%s "$DEB")
          echo "deb: $DEB ($DEB_SIZE bytes)"
          if [ "$DEB_SIZE" -lt 52428800 ]; then echo "ERROR: deb too small (<50MB)"; exit 1; fi

          echo "=== Checking deb metadata ==="
          dpkg-deb --info "$DEB"

          echo "=== Checking deb is a valid ELF package ==="
          MAIN_BIN=$(dpkg-deb --contents "$DEB" | grep -m1 "opt/Dorothy/dorothy$" | awk '{print $NF}')
          if [ -z "$MAIN_BIN" ]; then echo "ERROR: dorothy binary not found in deb"; exit 1; fi
          echo "Main binary found: $MAIN_BIN"

          echo "=== All checks passed ==="

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dorothy-Linux-deb-${{ matrix.arch }}
          path: release/*.deb
          if-no-files-found: warn

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
